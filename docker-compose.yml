version: '3.8'

services:
  # Infrastructure Services
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chequesecure
      MYSQL_USER: chequesecure
      MYSQL_PASSWORD: chequesecure
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - chequesecure-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/chequesecure
      KC_DB_USERNAME: chequesecure
      KC_DB_PASSWORD: chequesecure
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - chequesecure-network

  # Config Service
  config-service:
    build:
      context: .
      dockerfile: config-service/Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    networks:
      - chequesecure-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Discovery Service (Eureka)
  discovery-service:
    build:
      context: .
      dockerfile: discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    depends_on:
      config-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - chequesecure-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Gateway Service
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "9999:9999"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/chequesecure
    networks:
      - chequesecure-network

  # Commercant Service
  commercant-service:
    build:
      context: .
      dockerfile: commercant-service/Dockerfile
    container_name: commercant-service
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chequesecure
      SPRING_DATASOURCE_USERNAME: chequesecure
      SPRING_DATASOURCE_PASSWORD: chequesecure
    networks:
      - chequesecure-network

  # Banque Centrale Service
  banque-centrale-service:
    build:
      context: .
      dockerfile: banque-centrale-service/Dockerfile
    container_name: banque-centrale-service
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chequesecure
      SPRING_DATASOURCE_USERNAME: chequesecure
      SPRING_DATASOURCE_PASSWORD: chequesecure
    networks:
      - chequesecure-network

  # Agence Bancaire Service
  agence-bancaire-service:
    build:
      context: .
      dockerfile: agence-bancaire-service/Dockerfile
    container_name: agence-bancaire-service
    ports:
      - "8083:8083"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chequesecure
      SPRING_DATASOURCE_USERNAME: chequesecure
      SPRING_DATASOURCE_PASSWORD: chequesecure
    networks:
      - chequesecure-network

networks:
  chequesecure-network:
    driver: bridge

volumes:
  mysql_data:
